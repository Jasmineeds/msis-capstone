<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汪語學院 - Woof Korean Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.viverse.com/static-assets/viverse-sdk/1.3.3/index.umd.cjs"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            backdrop-filter: blur(10px);
        }

        .level-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .level-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .xp-bar {
            width: 150px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* 對話框 */
        #dialogue-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .dialogue-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .teacher-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .teacher-name {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }

        .dialogue-text {
            font-size: 20px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 20px;
        }

        .dialogue-text .korean {
            font-size: 28px;
            color: #667eea;
            font-weight: bold;
        }

        .dialogue-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: left;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        /* 測驗面板 */
        #quiz-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 25px;
            padding: 40px;
            z-index: 100;
            display: none;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-width: 400px;
        }

        .quiz-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }

        .quiz-character {
            font-size: 120px;
            color: #667eea;
            margin-bottom: 30px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .quiz-btn {
            padding: 20px;
            font-size: 24px;
            background: #f0f0f0;
            border: 3px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-btn:hover {
            border-color: #667eea;
            background: #f8f8ff;
        }

        /* 開始畫面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .game-title {
            font-size: 72px;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .game-subtitle {
            font-size: 24px;
            color: #aaa;
            margin-bottom: 50px;
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.5);
        }

        /* 提示 */
        #hint {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            z-index: 90;
            display: none;
        }

        /* 成功動畫 */
        .success-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 32px;
            z-index: 300;
            animation: popIn 0.5s ease forwards;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* 控制提示 */
        #controls-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 14px;
            z-index: 100;
        }

        /* 課程選擇面板 */
        #lesson-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 30px;
            z-index: 150;
            display: none;
            min-width: 350px;
            max-height: 80vh;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        #lesson-menu.show,
        #leaderboard-panel.show {
            display: flex;
            flex-direction: column;
        }

        #leaderboard-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 30px;
            z-index: 150;
            display: none;
            min-width: 350px;
            max-height: 80vh;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        #leaderboard-list {
            flex: 1;
            overflow-y: auto;
            max-height: 50vh;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .leaderboard-item.top-3 {
            background: linear-gradient(135deg, #ffd700 0%, #ffec8b 100%);
        }

        .leaderboard-rank {
            font-size: 20px;
            font-weight: bold;
            width: 40px;
            color: #333;
        }

        .leaderboard-name {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .leaderboard-score {
            font-size: 18px;
            font-weight: bold;
            color: #4a90d9;
        }

        #leaderboard-btn {
            position: absolute;
            bottom: 20px;
            left: 140px;
            padding: 12px 20px;
            font-size: 16px;
            background: linear-gradient(135deg, #ffd700 0%, #ffb347 100%);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            z-index: 100;
        }

        #lesson-list {
            flex: 1;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            max-height: 50vh;
            padding-right: 10px;
        }

        .lesson-menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f8f8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lesson-item:hover {
            background: #e8e8ff;
            transform: translateX(5px);
        }

        .lesson-item.completed {
            background: #e8ffe8;
        }

        .lesson-item.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .lesson-icon {
            font-size: 30px;
            margin-right: 15px;
        }

        .lesson-info h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #333;
        }

        .lesson-info p {
            margin: 0;
            font-size: 12px;
            color: #888;
        }

        .lesson-status {
            margin-left: auto;
            font-size: 20px;
        }

        .close-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        /* 課程按鈕 */
        #lesson-btn {
            position: absolute;
            top: 90px;
            left: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            display: none;
        }

        #lesson-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas-container"></div>
        
        <!-- Start Screen -->
        <div id="start-screen">
            <div class="game-title">🐕 Woof Korean Academy</div>
            <div class="game-subtitle">Learn Korean with your doggy teachers!</div>
            <button class="start-btn" id="login-btn">Login with VIVERSE</button>
            <button class="start-btn" id="guest-btn" style="margin-top: 15px; background: linear-gradient(135deg, #555 0%, #333 100%);">Guest Mode</button>
            <div id="user-info" style="margin-top: 20px; color: #aaa; display: none;"></div>
        </div>

        <!-- HUD -->
        <div id="hud" style="display: none;">
            <div class="hud-box">
                <div class="level-info">
                    <div id="player-name" style="font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #FFD700;"></div>
                    <span class="level-badge">Lv. <span id="level">1</span></span>
                    <div>
                        <div style="font-size: 12px; margin-bottom: 5px;">XP: <span id="xp">0</span>/100</div>
                        <div class="xp-bar">
                            <div class="xp-fill" id="xp-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nickname Modal -->
        <div id="nickname-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center;">
            <div style="background: linear-gradient(135deg, #2a2a4a 0%, #1a1a2e 100%); padding: 30px; border-radius: 20px; text-align: center; max-width: 400px;">
                <h2 style="color: #FFD700; margin-bottom: 20px;">🐕 Welcome!</h2>
                <p style="color: #fff; margin-bottom: 20px;">Enter your nickname:</p>
                <input type="text" id="nickname-input" placeholder="Your name" maxlength="20" style="width: 100%; padding: 12px; font-size: 18px; border: none; border-radius: 10px; margin-bottom: 20px; text-align: center;">
                <button id="nickname-submit" style="background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); border: none; padding: 12px 40px; font-size: 18px; border-radius: 25px; cursor: pointer; font-weight: bold;">Start Learning!</button>
            </div>
        </div>

        <!-- Controls Hint -->
        <div id="controls-hint" style="display: none;">
            🖱️ Drag to rotate view<br>
            📍 Click on the teacher to start
        </div>

        <!-- Lesson Button -->
        <button id="lesson-btn" style="display: none;">📚 Select Lesson</button>
        
        <!-- Leaderboard Button -->
        <button id="leaderboard-btn" style="display: none;">🏆 Leaderboard</button>

        <!-- Hint -->
        <div id="hint">Click on Shiba Teacher to start Lesson 1!</div>

        <!-- Lesson Menu -->
        <div id="lesson-menu">
            <button class="close-menu" onclick="closeLessonMenu()">✕</button>
            <div class="lesson-menu-title">📚 Select Lesson</div>
            <div id="lesson-list"></div>
        </div>

        <!-- Leaderboard Panel -->
        <div id="leaderboard-panel">
            <button class="close-menu" onclick="closeLeaderboard()">✕</button>
            <div class="lesson-menu-title">🏆 Leaderboard</div>
            <div id="leaderboard-list"></div>
        </div>

        <!-- Dialogue Box -->
        <div id="dialogue-box">
            <div class="dialogue-header">
                <div class="teacher-avatar">🐕</div>
                <div class="teacher-name">Shiba Teacher</div>
            </div>
            <div class="dialogue-text" id="dialogue-text"></div>
            <div class="dialogue-options" id="dialogue-options"></div>
        </div>

        <!-- Quiz Panel -->
        <div id="quiz-panel">
            <div class="quiz-title" id="quiz-title">How do you pronounce this?</div>
            <div class="quiz-character" id="quiz-character">ㅏ</div>
            <div class="quiz-options" id="quiz-options"></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
